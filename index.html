<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>英作文添削アプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1208;
      --cream: #f5f0e8;
      --parchment: #ece5d5;
      --gold: #c8922a;
      --gold-light: #e8b84b;
      --red-mark: #c0392b;
      --green-mark: #1a6b3c;
      --shadow: rgba(26,18,8,0.15);
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* 背景テクスチャ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.18) 28px),
        repeating-linear-gradient(90deg, transparent, transparent 99%, rgba(180,160,120,0.05) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* ヘッダー */
    header {
      text-align: center;
      padding: 48px 0 36px;
      border-bottom: 2px solid var(--gold);
      margin-bottom: 40px;
      position: relative;
    }
    header::after {
      content: '✦';
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--cream);
      color: var(--gold);
      padding: 0 12px;
      font-size: 18px;
    }
    .logo-en {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 42px);
      color: var(--ink);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }
    .logo-ja {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.3em;
      margin-top: 6px;
      font-weight: 700;
    }

    /* カード */
    .card {
      background: #fff;
      border: 1px solid rgba(200,180,140,0.4);
      border-radius: 2px;
      padding: 32px;
      margin-bottom: 28px;
      box-shadow: 4px 4px 0 rgba(200,180,140,0.25), 0 2px 16px var(--shadow);
      position: relative;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
    }

    /* レベル選択 */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 4px;
    }
    .level-btn {
      border: 1.5px solid rgba(200,160,80,0.4);
      background: var(--cream);
      border-radius: 2px;
      padding: 10px 8px;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      transition: all 0.18s ease;
      text-align: center;
    }
    .level-btn:hover { background: var(--parchment); border-color: var(--gold); }
    .level-btn.active {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.12);
    }

    /* テーマ */
    .theme-input {
      width: 100%;
      background: var(--cream);
      border: 1.5px solid rgba(200,160,80,0.4);
      border-radius: 2px;
      padding: 11px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.18s;
    }
    .theme-input:focus { border-color: var(--gold); background: #fff; }
    .theme-input::placeholder { color: #bba87a; }

    /* 英作文テキストエリア */
    .essay-area {
      width: 100%;
      min-height: 180px;
      background: #fffef9;
      border: 1.5px solid rgba(200,160,80,0.35);
      border-radius: 2px;
      padding: 16px;
      font-family: 'Source Serif 4', serif;
      font-size: 15.5px;
      line-height: 1.85;
      color: var(--ink);
      outline: none;
      resize: vertical;
      transition: border-color 0.18s;
      background-image: repeating-linear-gradient(transparent, transparent 28px, rgba(180,150,100,0.12) 29px);
    }
    .essay-area:focus { border-color: var(--gold); background-color: #fff; }
    .essay-area::placeholder { color: #cbb88a; font-style: italic; }

    /* 文字数 */
    .char-count {
      text-align: right;
      font-size: 12px;
      color: #a0906a;
      margin-top: 6px;
    }
    .char-count span { color: var(--gold); font-weight: 700; }

    /* 送信ボタン */
    .submit-btn {
      width: 100%;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 2px;
      padding: 16px;
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(200,146,42,0.2));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { background: #2d2010; transform: translateY(-1px); box-shadow: 0 4px 16px var(--shadow); }
    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { background: #9a8e7a; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ローディング */
    .loading-wrap {
      display: none;
      text-align: center;
      padding: 48px 0;
    }
    .loading-wrap.show { display: block; }
    .quill-anim {
      display: inline-block;
      font-size: 36px;
      animation: write 0.8s ease-in-out infinite alternate;
    }
    @keyframes write {
      from { transform: rotate(-10deg) translateY(0); }
      to   { transform: rotate(5deg) translateY(-4px); }
    }
    .loading-text {
      margin-top: 14px;
      font-size: 13px;
      color: #8a7a5a;
      letter-spacing: 0.15em;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* 結果エリア */
    #result-area { display: none; }
    #result-area.show { display: block; }

    /* スコア */
    .score-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--ink);
      color: var(--cream);
      padding: 20px 28px;
      border-radius: 2px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .score-item { text-align: center; }
    .score-num {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      color: var(--gold-light);
      line-height: 1;
    }
    .score-sub { font-size: 11px; letter-spacing: 0.2em; color: #c8b890; margin-top: 4px; }
    .score-divider { width: 1px; height: 50px; background: rgba(200,180,140,0.3); }

    /* 添削結果 */
    .result-section { margin-bottom: 20px; }
    .result-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--gold);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px dashed rgba(200,160,80,0.35);
    }
    .result-text {
      font-size: 14px;
      line-height: 1.85;
      color: #2d2010;
      background: var(--cream);
      border-left: 3px solid var(--gold);
      padding: 14px 16px;
      border-radius: 0 2px 2px 0;
    }
    .result-text.corrected {
      font-family: 'Source Serif 4', serif;
      font-size: 15px;
      border-left-color: var(--green-mark);
      background: #f0faf4;
    }

    /* エラー表示 */
    .error-items { display: flex; flex-direction: column; gap: 10px; }
    .error-item {
      background: #fff8f7;
      border: 1px solid rgba(192,57,43,0.2);
      border-left: 3px solid var(--red-mark);
      padding: 12px 14px;
      border-radius: 0 2px 2px 0;
      font-size: 13.5px;
      line-height: 1.7;
    }
    .error-original { color: var(--red-mark); font-family: 'Source Serif 4', serif; font-style: italic; }
    .error-arrow { color: #8a7a5a; margin: 3px 0; font-size: 12px; }
    .error-fix { color: var(--green-mark); font-family: 'Source Serif 4', serif; }
    .error-reason { color: #5a4a2a; font-size: 12.5px; margin-top: 4px; }

    /* フッター */
    footer {
      text-align: center;
      padding-top: 32px;
      border-top: 1px solid rgba(200,160,80,0.25);
      font-size: 12px;
      color: #a0906a;
      letter-spacing: 0.1em;
    }

    /* アニメーション */
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .card { padding: 20px 16px; }
      .score-divider { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-en">Essay Correction</div>
      <div class="logo-ja">英作文添削アプリ</div>
    </header>

    <!-- 設定カード -->
    <div class="card fade-in">
      <div class="card-label">Level</div>
      <div class="level-grid" id="level-grid">
        <button class="level-btn" data-level="英検5級">英検5級</button>
        <button class="level-btn" data-level="英検4級">英検4級</button>
        <button class="level-btn" data-level="英検3級">英検3級</button>
        <button class="level-btn active" data-level="英検準2級">英検準2級</button>
        <button class="level-btn" data-level="英検2級">英検2級</button>
        <button class="level-btn" data-level="英検準1級">英検準1級</button>
        <button class="level-btn" data-level="英検1級">英検1級</button>
      </div>
    </div>

    <!-- テーマ -->
    <div class="card fade-in" style="animation-delay:0.08s">
      <div class="card-label">Theme / Topic</div>
      <input class="theme-input" id="theme-input" type="text"
        placeholder="例: Should students use smartphones in class?" />
    </div>

    <!-- 英作文入力 -->
    <div class="card fade-in" style="animation-delay:0.16s">
      <div class="card-label">Your Essay</div>
      <textarea class="essay-area" id="essay-input"
        placeholder="ここに英作文を入力してください..."></textarea>
      <div class="char-count">文字数: <span id="char-num">0</span></div>
    </div>

    <!-- 送信 -->
    <button class="submit-btn fade-in" id="submit-btn" style="animation-delay:0.24s">
      ✦ 添削を開始する
    </button>

    <!-- ローディング -->
    <div class="loading-wrap" id="loading">
      <div class="quill-anim">🪶</div>
      <div class="loading-text">添削中です。しばらくお待ちください…</div>
    </div>

    <!-- 結果 -->
    <div id="result-area">
      <div class="score-banner" id="score-banner"></div>
      <div class="card fade-in" id="corrected-card">
        <div class="card-label">Corrected Essay</div>
        <div class="result-section">
          <div class="result-text corrected" id="corrected-text"></div>
        </div>
      </div>
      <div class="card fade-in" id="errors-card">
        <div class="card-label">Errors & Fixes</div>
        <div class="error-items" id="errors-list"></div>
      </div>
      <div class="card fade-in" id="feedback-card">
        <div class="card-label">Overall Feedback</div>
        <div class="result-text" id="feedback-text"></div>
      </div>
      <div class="card fade-in" id="advice-card">
        <div class="card-label">Improvement Advice</div>
        <div class="result-text" id="advice-text"></div>
      </div>
    </div>

    <footer>
      &copy; 2025 Essay Correction App &nbsp;✦&nbsp; Powered by Claude AI
    </footer>
  </div>

  <script>
    // --- 状態 ---
    let selectedLevel = '英検準2級';

    // レベルボタン
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedLevel = btn.dataset.level;
      });
    });

    // 文字数カウント
    const essayInput = document.getElementById('essay-input');
    const charNum = document.getElementById('char-num');
    essayInput.addEventListener('input', () => {
      charNum.textContent = essayInput.value.length;
    });

    // 送信
    document.getElementById('submit-btn').addEventListener('click', runCorrection);

    async function runCorrection() {
      const essay = essayInput.value.trim();
      const theme = document.getElementById('theme-input').value.trim();

      if (!essay) { alert('英作文を入力してください。'); return; }

      // UI切り替え
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('loading').classList.add('show');
      document.getElementById('result-area').classList.remove('show');

      const prompt = `
あなたは英語の試験（${selectedLevel}レベル）の採点官です。
以下の英作文を丁寧に添削し、必ず下記のJSON形式のみで返答してください。
余分な文章やMarkdownのコードブロック（\`\`\`json等）は一切含めないでください。

${theme ? `テーマ: ${theme}\n` : ''}英作文:
${essay}

返答形式（JSONのみ）:
{
  "score": 数値(0-100),
  "grade": "A/B/C/D/E のいずれか",
  "corrected": "修正後の全文（英語）",
  "errors": [
    {
      "original": "誤りの箇所（英語）",
      "fix": "修正後（英語）",
      "reason": "理由（日本語）"
    }
  ],
  "feedback": "全体的なフィードバック（日本語、3〜5文）",
  "advice": "今後の学習アドバイス（日本語、2〜3文）"
}
      `.trim();

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        const data = await response.json();
        const text = data.content.map(i => i.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const result = JSON.parse(clean);
        renderResult(result);
      } catch (err) {
        alert('エラーが発生しました。しばらく待ってから再試行してください。\n' + err.message);
        console.error(err);
      } finally {
        document.getElementById('loading').classList.remove('show');
        document.getElementById('submit-btn').disabled = false;
      }
    }

    function renderResult(r) {
      // スコアバナー
      const gradeColors = { A:'#27ae60', B:'#2980b9', C:'#f39c12', D:'#e67e22', E:'#c0392b' };
      const gradeColor = gradeColors[r.grade] || '#c8922a';
      document.getElementById('score-banner').innerHTML = `
        <div class="score-item">
          <div class="score-num">${r.score}</div>
          <div class="score-sub">SCORE / 100</div>
        </div>
        <div class="score-divider"></div>
        <div class="score-item">
          <div class="score-num" style="color:${gradeColor}">${r.grade}</div>
          <div class="score-sub">GRADE</div>
        </div>
        <div class="score-divider"></div>
        <div class="score-item">
          <div class="score-num" style="font-size:22px">${selectedLevel}</div>
          <div class="score-sub">LEVEL</div>
        </div>
      `;

      // 修正文
      document.getElementById('corrected-text').textContent = r.corrected;

      // エラー一覧
      const list = document.getElementById('errors-list');
      if (!r.errors || r.errors.length === 0) {
        list.innerHTML = '<div class="result-text">エラーは見つかりませんでした。素晴らしい！</div>';
      } else {
        list.innerHTML = r.errors.map(e => `
          <div class="error-item">
            <div class="error-original">✕ ${e.original}</div>
            <div class="error-arrow">↓</div>
            <div class="error-fix">✓ ${e.fix}</div>
            <div class="error-reason">${e.reason}</div>
          </div>
        `).join('');
      }

      // フィードバック・アドバイス
      document.getElementById('feedback-text').textContent = r.feedback;
      document.getElementById('advice-text').textContent = r.advice;

      // 表示
      const area = document.getElementById('result-area');
      area.classList.add('show');
      area.querySelectorAll('.card').forEach((c, i) => {
        c.style.animationDelay = `${i * 0.08}s`;
        c.classList.remove('fade-in');
        void c.offsetWidth;
        c.classList.add('fade-in');
      });
      area.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>
</body>
</html>
